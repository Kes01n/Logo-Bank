<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Банк — Простая версия</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f5fa;
      margin: 0;
      padding: 16px;
      min-height: 100vh;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1e3b5c;
      text-align: center;
      margin: 0 0 20px 0;
    }

    h2 {
      color: #1e3b5c;
      font-size: 1.2rem;
      margin: 16px 0 8px 0;
    }

    input, button {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      border-radius: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    input {
      border: 2px solid #dde5ed;
      background: white;
    }

    button {
      background: #1e3b5c;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      opacity: 0.8;
    }

    button.secondary {
      background: white;
      color: #1e3b5c;
      border: 2px solid #1e3b5c;
    }

    .balance {
      background: #1e3b5c;
      color: white;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 20px;
    }

    .balance-amount {
      font-size: 2.5rem;
      font-weight: bold;
    }

    .card {
      background: #f8fbfe;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .users-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .user-btn {
      background: white;
      border: 2px solid #1e3b5c;
      color: #1e3b5c;
      padding: 10px 16px;
      border-radius: 30px;
      font-weight: bold;
      width: auto;
      margin: 0;
    }

    .user-btn:active {
      background: #1e3b5c;
      color: white;
    }

    .history-item {
      padding: 12px;
      background: white;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .green {
      color: #2a9d8f;
      font-weight: bold;
    }

    .red {
      color: #e76f51;
      font-weight: bold;
    }

    .error {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .success {
      color: #2a9d8f;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .hidden {
      display: none !important;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: #eef3f9;
      border-radius: 30px;
      cursor: pointer;
    }

    .tab.active {
      background: #1e3b5c;
      color: white;
    }

    .info {
      background: #e8f0fe;
      padding: 12px;
      border-radius: 12px;
      margin: 12px 0;
      text-align: center;
    }

    .big-code {
      font-size: 2.5rem;
      font-weight: bold;
      color: #1e3b5c;
      letter-spacing: 5px;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <!-- Содержимое будет здесь -->
  </div>

  <script>
    // ПРОСТАЯ ВЕРСИЯ БЕЗ СЛОЖНОСТЕЙ
    
    let users = {};
    let currentUser = null;
    
    // Загружаем данные
    try {
      const saved = localStorage.getItem('simple_bank');
      if (saved) users = JSON.parse(saved);
    } catch(e) {
      users = {};
    }
    
    // Создаём демо пользователя
    if (!users['demo']) {
      users['demo'] = {
        password: 'demo',
        balance: 5000,
        transactions: []
      };
    }
    
    // Создаём тестового пользователя для переводов
    if (!users['test']) {
      users['test'] = {
        password: 'test',
        balance: 1000,
        transactions: []
      };
    }
    
    // Коды для перевода (простые)
    const codes = {
      'demo': '111111',
      'test': '222222'
    };
    
    function save() {
      localStorage.setItem('simple_bank', JSON.stringify(users));
    }
    
    save();
    
    function render() {
      const app = document.getElementById('app');
      
      // Проверяем, есть ли сохранённая сессия
      const savedUser = localStorage.getItem('simple_current_user');
      if (savedUser && users[savedUser]) {
        currentUser = savedUser;
        renderMain();
      } else {
        renderLogin();
      }
    }
    
    function renderLogin() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <h1>🏦 Logo Банк</h1>
        
        <div class="card">
          <h2>Вход</h2>
          <input type="text" id="loginInput" placeholder="Логин" value="demo">
          <input type="password" id="passInput" placeholder="Пароль" value="demo">
          <div class="error" id="errorMsg"></div>
          <button onclick="login()">Войти</button>
          <button class="secondary" onclick="showRegister()">Регистрация</button>
          <div style="margin-top:16px; text-align:center; color:#6f8aa3;">
            💡 Логин: demo / test<br>Пароль: demo / test
          </div>
        </div>
      `;
    }
    
    function showRegister() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <h1>🏦 Регистрация</h1>
        
        <div class="card">
          <h2>Создать аккаунт</h2>
          <input type="text" id="regLogin" placeholder="Логин (мин 3 символа)">
          <input type="password" id="regPass" placeholder="Пароль (мин 4 символа)">
          <div class="error" id="regError"></div>
          <button onclick="register()">Зарегистрироваться</button>
          <button class="secondary" onclick="renderLogin()">← Назад</button>
        </div>
      `;
    }
    
    window.login = function() {
      const login = document.getElementById('loginInput').value.trim();
      const pass = document.getElementById('passInput').value;
      
      if (users[login] && users[login].password === pass) {
        currentUser = login;
        localStorage.setItem('simple_current_user', currentUser);
        renderMain();
      } else {
        document.getElementById('errorMsg').textContent = '❌ Неверный логин или пароль';
      }
    };
    
    window.register = function() {
      const login = document.getElementById('regLogin').value.trim();
      const pass = document.getElementById('regPass').value;
      
      if (login.length < 3) {
        document.getElementById('regError').textContent = '❌ Логин минимум 3 символа';
        return;
      }
      if (pass.length < 4) {
        document.getElementById('regError').textContent = '❌ Пароль минимум 4 символа';
        return;
      }
      if (users[login]) {
        document.getElementById('regError').textContent = '❌ Пользователь уже существует';
        return;
      }
      
      users[login] = {
        password: pass,
        balance: 0,
        transactions: []
      };
      
      // Даём код
      codes[login] = Math.floor(100000 + Math.random() * 900000).toString();
      
      save();
      alert('✅ Регистрация успешна!');
      renderLogin();
    };
    
    function renderMain() {
      const user = users[currentUser];
      const app = document.getElementById('app');
      
      // Код пользователя
      if (!codes[currentUser]) {
        codes[currentUser] = Math.floor(100000 + Math.random() * 900000).toString();
      }
      
      app.innerHTML = `
        <h1>🏦 Logo Банк</h1>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <h2 style="margin:0;">👤 ${currentUser}</h2>
          <button class="secondary" style="width:auto; padding:10px 20px;" onclick="logout()">Выйти</button>
        </div>
        
        <div class="balance">
          <div>Баланс</div>
          <div class="balance-amount">${user.balance.toFixed(2)} ₽</div>
        </div>
        
        <div class="tabs">
          <div class="tab active" onclick="showTab('transfer')">💸 Перевод</div>
          <div class="tab" onclick="showTab('deposit')">⬆️ Пополнить</div>
          <div class="tab" onclick="showTab('history')">📋 История</div>
        </div>
        
        <div id="tabContent"></div>
      `;
      
      showTab('transfer');
    }
    
    window.showTab = function(tab) {
      // Обновляем активный таб
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.remove('active');
      });
      event.target.classList.add('active');
      
      const content = document.getElementById('tabContent');
      const user = users[currentUser];
      
      if (tab === 'transfer') {
        // Список других пользователей
        const otherUsers = Object.keys(users).filter(u => u !== currentUser);
        
        content.innerHTML = `
          <div class="card">
            <h2>Мой код для получения</h2>
            <div class="info">
              <div style="font-size:0.9rem;">Покажите этот код отправителю:</div>
              <div class="big-code">${codes[currentUser]}</div>
              <button class="secondary" onclick="copyCode('${codes[currentUser]}')">📋 Копировать</button>
            </div>
            
            <h2 style="margin-top:20px;">Отправить перевод</h2>
            
            ${otherUsers.length > 0 ? `
              <div style="margin-bottom:12px;">
                <div style="margin-bottom:8px;">Выберите получателя:</div>
                <div class="users-list">
                  ${otherUsers.map(u => `
                    <button class="user-btn" onclick="selectUser('${u}')">${u}</button>
                  `).join('')}
                </div>
              </div>
            ` : '<p>Нет других пользователей</p>'}
            
            <input type="text" id="transferTo" placeholder="Или введите код получателя" maxlength="6">
            <input type="number" id="transferAmount" placeholder="Сумма" min="1" step="0.01">
            <div class="error" id="transferError"></div>
            <button onclick="sendTransfer()">Отправить</button>
          </div>
        `;
      } else if (tab === 'deposit') {
        content.innerHTML = `
          <div class="card">
            <h2>Пополнение баланса</h2>
            <input type="number" id="depositAmount" placeholder="Сумма" min="1" step="0.01">
            <button onclick="deposit()">Пополнить</button>
          </div>
        `;
      } else if (tab === 'history') {
        const tx = user.transactions || [];
        
        if (tx.length === 0) {
          content.innerHTML = `
            <div class="card">
              <p style="text-align:center; color:#888;">Нет операций</p>
            </div>
          `;
        } else {
          content.innerHTML = `
            <div class="card">
              ${tx.reverse().slice(0, 20).map(t => {
                const isPlus = t.type === 'deposit' || t.to === currentUser;
                return `
                  <div class="history-item">
                    <div>
                      <div>${t.desc || t.type}</div>
                      <small>${new Date(t.date).toLocaleString()}</small>
                    </div>
                    <div class="${isPlus ? 'green' : 'red'}">
                      ${isPlus ? '+' : '-'}${t.amount.toFixed(2)} ₽
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }
      }
    };
    
    window.copyCode = function(code) {
      navigator.clipboard?.writeText(code);
      alert('📋 Код скопирован!');
    };
    
    window.selectUser = function(username) {
      document.getElementById('transferTo').value = codes[username] || '';
    };
    
    window.sendTransfer = function() {
      const codeInput = document.getElementById('transferTo').value.trim();
      const amount = parseFloat(document.getElementById('transferAmount').value);
      
      if (!codeInput) {
        document.getElementById('transferError').textContent = '❌ Введите код получателя';
        return;
      }
      
      if (amount <= 0 || isNaN(amount)) {
        document.getElementById('transferError').textContent = '❌ Неверная сумма';
        return;
      }
      
      if (amount > users[currentUser].balance) {
        document.getElementById('transferError').textContent = '❌ Недостаточно средств';
        return;
      }
      
      // Ищем получателя по коду
      let recipient = null;
      for (let user in codes) {
        if (codes[user] === codeInput) {
          recipient = user;
          break;
        }
      }
      
      if (!recipient) {
        document.getElementById('transferError').textContent = '❌ Неверный код получателя';
        return;
      }
      
      if (recipient === currentUser) {
        document.getElementById('transferError').textContent = '❌ Нельзя отправить себе';
        return;
      }
      
      // Выполняем перевод
      users[currentUser].balance -= amount;
      users[recipient].balance += amount;
      
      const tx = {
        type: 'transfer',
        amount: amount,
        from: currentUser,
        to: recipient,
        desc: `Перевод для ${recipient}`,
        date: new Date().toISOString()
      };
      
      if (!users[currentUser].transactions) users[currentUser].transactions = [];
      if (!users[recipient].transactions) users[recipient].transactions = [];
      
      users[currentUser].transactions.push(tx);
      users[recipient].transactions.push({
        ...tx,
        desc: `От ${currentUser}`
      });
      
      save();
      alert(`✅ Отправлено ${amount.toFixed(2)} ₽ для ${recipient}`);
      renderMain();
    };
    
    window.deposit = function() {
      const amount = parseFloat(document.getElementById('depositAmount').value);
      
      if (amount <= 0 || isNaN(amount)) {
        alert('❌ Неверная сумма');
        return;
      }
      
      users[currentUser].balance += amount;
      
      if (!users[currentUser].transactions) users[currentUser].transactions = [];
      users[currentUser].transactions.push({
        type: 'deposit',
        amount: amount,
        desc: 'Пополнение',
        date: new Date().toISOString()
      });
      
      save();
      alert(`✅ Пополнено ${amount.toFixed(2)} ₽`);
      renderMain();
    };
    
    window.logout = function() {
      currentUser = null;
      localStorage.removeItem('simple_current_user');
      renderLogin();
    };
    
    // Запуск
    render();
  </script>
</body>
</html>
