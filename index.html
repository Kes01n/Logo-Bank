<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Банк — Облачная версия</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f5fa 0%, #e6edf4 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      padding: 20px 16px 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1a3b5d, #2a5f8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .online-badge {
      background: #2a9d8f;
      color: white;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card {
      background: #f8fbfe;
      border-radius: 20px;
      padding: 18px 16px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 1.3rem;
      color: #1e3b5c;
      margin-bottom: 16px;
    }

    h3 {
      font-size: 1.1rem;
      color: #1e3b5c;
      margin-bottom: 12px;
    }

    .balance {
      background: linear-gradient(135deg, #1e3b5c, #2a5f8a);
      border-radius: 20px;
      padding: 20px;
      color: white;
      margin-bottom: 16px;
    }

    .balance-amount {
      font-size: 2.5rem;
      font-weight: 700;
      margin-top: 4px;
    }

    .btn {
      border: none;
      border-radius: 50px;
      padding: 12px 18px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      border: 1px solid #d0dce8;
    }

    .btn-primary {
      background: #1e3b5c;
      color: white;
      border: none;
      width: 100%;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 0.85rem;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #2c4b6e;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      font-size: 0.95rem;
      border: 1.5px solid #dde5ed;
      border-radius: 16px;
      background: white;
      outline: none;
    }

    input:focus {
      border-color: #1e3b5c;
    }

    .users-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 12px 0;
    }

    .user-tag {
      background: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 0.9rem;
      border: 1px solid #c8d8e8;
      cursor: pointer;
    }

    .user-tag:active {
      background: #1e3b5c;
      color: white;
    }

    .cards-list {
      margin: 12px 0;
    }

    .card-item {
      background: white;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      border: 1px solid #d4e2f0;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      background: #eef3f9;
      padding: 4px;
      border-radius: 50px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 50px;
      font-weight: 600;
      color: #5f7d99;
      cursor: pointer;
      border: none;
      background: transparent;
    }

    .tab.active {
      background: white;
      color: #1e3b5c;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .history-item {
      padding: 12px;
      border-bottom: 1px solid #e8eef4;
      display: flex;
      justify-content: space-between;
    }

    .amount-plus {
      color: #2a9d8f;
      font-weight: 700;
    }

    .amount-minus {
      color: #e76f51;
      font-weight: 700;
    }

    .error {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .hidden {
      display: none !important;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      border-radius: 28px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3b5c;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 500;
      z-index: 2000;
      animation: fadeInOut 2s ease;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; }
      20%, 80% { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Logo</div>
    <div class="online-badge" id="syncStatus">
      <span>🟢</span> Онлайн
    </div>
  </div>

  <!-- Авторизация -->
  <div id="authScreen">
    <div class="card">
      <h2>Вход в банк</h2>
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="loginUser" placeholder="Ваш логин">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="loginPass" placeholder="••••••••">
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn btn-primary" id="loginBtn">Войти</button>
      <div style="margin-top: 16px; text-align: center;">
        <button class="btn btn-sm" id="showRegBtn">Создать аккаунт</button>
      </div>
      <div style="margin-top: 12px; font-size: 0.85rem; color: #6f8aa3; text-align: center;">
        💡 Демо: demo / demo
      </div>
    </div>
  </div>

  <!-- Регистрация -->
  <div id="regScreen" class="hidden">
    <div class="card">
      <h2>Регистрация</h2>
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="regUser" placeholder="Минимум 3 символа">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="regPass" placeholder="Минимум 4 символа">
      </div>
      <div class="form-group">
        <label>Повторите пароль</label>
        <input type="password" id="regPassConfirm" placeholder="••••••••">
      </div>
      <div class="error" id="regError"></div>
      <button class="btn btn-primary" id="regBtn">Зарегистрироваться</button>
      <button class="btn btn-sm" id="backToAuth" style="margin-top: 12px;">← Назад</button>
    </div>
  </div>

  <!-- Основной экран -->
  <div id="mainScreen" class="hidden">
    <div class="flex-between" style="margin-bottom: 12px;">
      <h2>👤 <span id="userName"></span></h2>
      <button class="btn btn-sm" id="logoutBtn">Выйти</button>
    </div>

    <!-- Карты -->
    <div class="card">
      <div class="flex-between">
        <h3>💳 Мои карты</h3>
        <button class="btn btn-sm" id="addCardBtn">+ Добавить</button>
      </div>
      <div id="cardsContainer" class="cards-list"></div>
    </div>

    <!-- Баланс -->
    <div class="balance">
      <div>Текущий баланс</div>
      <div class="balance-amount"><span id="balance">0</span> ₽</div>
    </div>

    <!-- Табы -->
    <div class="tabs">
      <button class="tab active" data-tab="transfer">💸 Перевод</button>
      <button class="tab" data-tab="deposit">⬆️ Пополнить</button>
      <button class="tab" data-tab="payment">🛒 Оплата</button>
    </div>

    <!-- Перевод -->
    <div id="transferTab" class="card">
      <h3>Перевод денег</h3>
      <div class="flex-between" style="margin-bottom: 8px;">
        <label>Доступные пользователи:</label>
        <button class="btn btn-sm" id="refreshUsers">🔄 Обновить</button>
      </div>
      <div class="users-list" id="usersContainer"></div>
      <div class="form-group">
        <label>Получатель</label>
        <input type="text" id="transferTo" placeholder="Логин получателя">
      </div>
      <div class="form-group">
        <label>Сумма</label>
        <input type="number" id="transferSum" placeholder="0.00" min="1" step="0.01">
      </div>
      <div class="error" id="transferError"></div>
      <button class="btn btn-primary" id="transferBtn">Отправить перевод</button>
    </div>

    <!-- Пополнение -->
    <div id="depositTab" class="card hidden">
      <h3>Пополнение с карты</h3>
      <div class="form-group">
        <label>Выберите карту</label>
        <select id="cardSelect"></select>
      </div>
      <div class="form-group">
        <label>Сумма</label>
        <input type="number" id="depositSum" placeholder="0.00" min="1">
      </div>
      <button class="btn btn-primary" id="depositBtn">Пополнить</button>
    </div>

    <!-- Оплата -->
    <div id="paymentTab" class="card hidden">
      <h3>Оплата услуг</h3>
      <div class="form-group">
        <label>Назначение</label>
        <input type="text" id="paymentFor" placeholder="Например: Интернет">
      </div>
      <div class="form-group">
        <label>Сумма</label>
        <input type="number" id="paymentSum" placeholder="0.00" min="1">
      </div>
      <button class="btn btn-primary" id="paymentBtn">Оплатить</button>
    </div>

    <!-- История -->
    <div class="card">
      <h3>📋 Последние операции</h3>
      <div id="historyContainer" style="max-height:200px; overflow-y:auto;"></div>
    </div>
  </div>
</div>

<!-- Модальное окно карты -->
<div id="cardModal" class="modal hidden">
  <div class="modal-content">
    <h3>Новая карта</h3>
    <div class="form-group">
      <label>Номер карты</label>
      <input type="text" id="cardNum" placeholder="0000 0000 0000 0000" maxlength="19">
    </div>
    <div class="form-group">
      <label>Имя владельца</label>
      <input type="text" id="cardName" placeholder="IVAN IVANOV">
    </div>
    <div style="display:flex; gap:8px;">
      <input type="text" id="cardMonth" placeholder="ММ" maxlength="2" style="flex:1;">
      <input type="text" id="cardYear" placeholder="ГГ" maxlength="2" style="flex:1;">
      <input type="text" id="cardCVV" placeholder="CVV" maxlength="3" style="flex:1;">
    </div>
    <div class="error" id="cardError"></div>
    <button class="btn btn-primary" id="saveCard">Сохранить</button>
    <button class="btn btn-sm" id="closeModal" style="margin-top:10px;">Отмена</button>
  </div>
</div>

<script>
  // ========== НАСТРОЙКИ (МЕНЯТЬ НЕ НУЖНО) ==========
  // Используем бесплатный сервер для синхронизации
  const SERVER_URL = 'https://jsonblob.com/api/jsonBlob/1331430566159187968';
  
  let users = {};
  let currentUser = null;
  let lastUpdate = 0;

  // Показываем уведомление
  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  // Загрузка данных с сервера
  async function loadFromServer() {
    try {
      document.getElementById('syncStatus').innerHTML = '<span>🟡</span> Синхр...';
      
      const response = await fetch(SERVER_URL);
      if (response.ok) {
        const data = await response.json();
        users = data;
        
        // Создаём демо если пусто
        if (!users['demo']) {
          users['demo'] = {
            password: 'demo',
            balance: 5000,
            cards: [],
            transactions: [{
              type: 'deposit',
              amount: 5000,
              desc: 'Начальный баланс',
              date: new Date().toISOString()
            }]
          };
          await saveToServer();
        }
        
        localStorage.setItem('logo_bank_cache', JSON.stringify(users));
        document.getElementById('syncStatus').innerHTML = '<span>🟢</span> Онлайн';
        lastUpdate = Date.now();
      }
      
      // Восстанавливаем сессию
      const savedUser = localStorage.getItem('logo_current_user');
      if (savedUser && users[savedUser]) {
        currentUser = savedUser;
        showMainScreen();
      }
      
      updateUI();
    } catch (e) {
      console.log('Офлайн режим');
      document.getElementById('syncStatus').innerHTML = '<span>🟠</span> Офлайн';
      
      // Загружаем из кеша
      const cached = localStorage.getItem('logo_bank_cache');
      if (cached) users = JSON.parse(cached);
      
      const savedUser = localStorage.getItem('logo_current_user');
      if (savedUser && users[savedUser]) {
        currentUser = savedUser;
        showMainScreen();
      }
      
      updateUI();
    }
  }

  // Сохранение на сервер
  async function saveToServer() {
    try {
      localStorage.setItem('logo_bank_cache', JSON.stringify(users));
      
      await fetch(SERVER_URL, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify(users)
      });
      
      document.getElementById('syncStatus').innerHTML = '<span>🟢</span> Онлайн';
      lastUpdate = Date.now();
    } catch (e) {
      console.log('Сохранено локально');
      document.getElementById('syncStatus').innerHTML = '<span>🟠</span> Локально';
    }
  }

  // Обновление интерфейса
  function updateUI() {
    if (!currentUser) return;
    
    const user = users[currentUser];
    if (!user) return;
    
    document.getElementById('userName').textContent = currentUser;
    document.getElementById('balance').textContent = user.balance.toFixed(2);
    
    // Карты
    const cardsDiv = document.getElementById('cardsContainer');
    const cardSelect = document.getElementById('cardSelect');
    
    if (!user.cards) user.cards = [];
    
    if (user.cards.length === 0) {
      cardsDiv.innerHTML = '<p style="color:#888; text-align:center;">Нет привязанных карт</p>';
      cardSelect.innerHTML = '<option>Нет карт</option>';
    } else {
      cardsDiv.innerHTML = user.cards.map((c, i) => `
        <div class="card-item">
          <div>💳 ${c.number?.startsWith('4') ? 'VISA' : 'MasterCard'}</div>
          <div style="font-family:monospace; font-size:1.1rem; margin:5px 0;">
            **** **** **** ${c.number?.slice(-4)}
          </div>
          <div>${c.name}</div>
          <button onclick="deleteCard(${i})" style="margin-top:8px; color:#e74c3c; background:none; border:none; cursor:pointer;">
            Удалить
          </button>
        </div>
      `).join('');
      
      cardSelect.innerHTML = user.cards.map((c, i) => 
        `<option value="${i}">**** ${c.number?.slice(-4)} (${c.name})</option>`
      ).join('');
    }
    
    // История
    const historyDiv = document.getElementById('historyContainer');
    if (!user.transactions) user.transactions = [];
    
    if (user.transactions.length === 0) {
      historyDiv.innerHTML = '<p style="color:#888; text-align:center;">Пока нет операций</p>';
    } else {
      historyDiv.innerHTML = user.transactions.slice(-10).reverse().map(t => {
        const isPlus = t.type === 'deposit' || t.to === currentUser;
        return `
          <div class="history-item">
            <div>
              <div>${t.desc || t.type}</div>
              <small>${new Date(t.date).toLocaleString('ru-RU')}</small>
            </div>
            <div class="${isPlus ? 'amount-plus' : 'amount-minus'}">
              ${isPlus ? '+' : '-'}${t.amount.toFixed(2)} ₽
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Список пользователей
    const usersDiv = document.getElementById('usersContainer');
    const otherUsers = Object.keys(users).filter(u => u !== currentUser);
    
    if (otherUsers.length === 0) {
      usersDiv.innerHTML = '<span style="color:#888;">Пока нет других пользователей</span>';
    } else {
      usersDiv.innerHTML = otherUsers.map(u => 
        `<span class="user-tag" onclick="document.getElementById('transferTo').value='${u}'">👤 ${u}</span>`
      ).join('');
    }
  }

  window.deleteCard = async function(index) {
    users[currentUser].cards.splice(index, 1);
    await saveToServer();
    updateUI();
  };

  function showMainScreen() {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('regScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    updateUI();
  }

  // Обработчики событий
  document.getElementById('loginBtn').onclick = async () => {
    const login = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    
    await loadFromServer(); // Обновляем данные перед входом
    
    if (users[login] && users[login].password === pass) {
      currentUser = login;
      localStorage.setItem('logo_current_user', currentUser);
      showMainScreen();
    } else {
      document.getElementById('loginError').textContent = 'Неверный логин или пароль';
    }
  };

  document.getElementById('showRegBtn').onclick = () => {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('regScreen').classList.remove('hidden');
  };

  document.getElementById('backToAuth').onclick = () => {
    document.getElementById('regScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
  };

  document.getElementById('regBtn').onclick = async () => {
    const login = document.getElementById('regUser').value.trim();
    const pass = document.getElementById('regPass').value;
    const confirm = document.getElementById('regPassConfirm').value;
    
    if (login.length < 3) {
      document.getElementById('regError').textContent = 'Логин должен быть от 3 символов';
      return;
    }
    if (pass.length < 4) {
      document.getElementById('regError').textContent = 'Пароль должен быть от 4 символов';
      return;
    }
    if (pass !== confirm) {
      document.getElementById('regError').textContent = 'Пароли не совпадают';
      return;
    }
    
    await loadFromServer(); // Обновляем перед регистрацией
    
    if (users[login]) {
      document.getElementById('regError').textContent = 'Пользователь уже существует';
      return;
    }
    
    users[login] = {
      password: pass,
      balance: 0,
      cards: [],
      transactions: []
    };
    
    await saveToServer();
    showToast('✅ Регистрация успешна!');
    
    document.getElementById('regScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('regUser').value = '';
    document.getElementById('regPass').value = '';
    document.getElementById('regPassConfirm').value = '';
  };

  document.getElementById('logoutBtn').onclick = () => {
    currentUser = null;
    localStorage.removeItem('logo_current_user');
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
  };

  // Перевод
  document.getElementById('transferBtn').onclick = async () => {
    await loadFromServer(); // Получаем свежие данные
    
    const to = document.getElementById('transferTo').value.trim();
    const amount = parseFloat(document.getElementById('transferSum').value);
    
    if (!to || !users[to]) {
      document.getElementById('transferError').textContent = '❌ Пользователь не найден. Попросите друга зарегистрироваться!';
      return;
    }
    if (to === currentUser) {
      document.getElementById('transferError').textContent = '❌ Нельзя перевести самому себе';
      return;
    }
    if (amount <= 0 || isNaN(amount)) {
      document.getElementById('transferError').textContent = '❌ Введите корректную сумму';
      return;
    }
    if (amount > users[currentUser].balance) {
      document.getElementById('transferError').textContent = '❌ Недостаточно средств';
      return;
    }
    
    // Выполняем перевод
    users[currentUser].balance -= amount;
    users[to].balance += amount;
    
    const tx = {
      type: 'transfer',
      amount: amount,
      from: currentUser,
      to: to,
      desc: `Перевод для ${to}`,
      date: new Date().toISOString()
    };
    
    if (!users[currentUser].transactions) users[currentUser].transactions = [];
    if (!users[to].transactions) users[to].transactions = [];
    
    users[currentUser].transactions.push(tx);
    users[to].transactions.push({
      ...tx,
      desc: `Поступление от ${currentUser}`
    });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('transferSum').value = '';
    document.getElementById('transferTo').value = '';
    document.getElementById('transferError').textContent = '';
    showToast(`✅ Переведено ${amount.toFixed(2)} ₽ для ${to}`);
  };

  // Добавление карты
  document.getElementById('addCardBtn').onclick = () => {
    document.getElementById('cardModal').classList.remove('hidden');
  };

  document.getElementById('closeModal').onclick = () => {
    document.getElementById('cardModal').classList.add('hidden');
  };

  document.getElementById('saveCard').onclick = async () => {
    const num = document.getElementById('cardNum').value.replace(/\s/g, '');
    const name = document.getElementById('cardName').value.trim();
    
    if (num.length !== 16) {
      document.getElementById('cardError').textContent = 'Номер карты должен быть 16 цифр';
      return;
    }
    if (!name) {
      document.getElementById('cardError').textContent = 'Введите имя владельца';
      return;
    }
    
    if (!users[currentUser].cards) users[currentUser].cards = [];
    users[currentUser].cards.push({ number: num, name: name });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('cardModal').classList.add('hidden');
    document.getElementById('cardNum').value = '';
    document.getElementById('cardName').value = '';
    showToast('✅ Карта добавлена');
  };

  // Формат карты
  document.getElementById('cardNum').oninput = (e) => {
    let val = e.target.value.replace(/\s/g, '');
    if (val.length > 16) val = val.slice(0, 16);
    e.target.value = val.replace(/(.{4})/g, '$1 ').trim();
  };

  // Пополнение
  document.getElementById('depositBtn').onclick = async () => {
    const amount = parseFloat(document.getElementById('depositSum').value);
    
    if (amount <= 0 || isNaN(amount)) {
      alert('Введите корректную сумму');
      return;
    }
    
    users[currentUser].balance += amount;
    
    if (!users[currentUser].transactions) users[currentUser].transactions = [];
    users[currentUser].transactions.push({
      type: 'deposit',
      amount: amount,
      desc: 'Пополнение с карты',
      date: new Date().toISOString()
    });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('depositSum').value = '';
    showToast(`✅ Баланс пополнен на ${amount.toFixed(2)} ₽`);
  };

  // Оплата
  document.getElementById('paymentBtn').onclick = async () => {
    const desc = document.getElementById('paymentFor').value.trim();
    const amount = parseFloat(document.getElementById('paymentSum').value);
    
    if (!desc) {
      alert('Укажите назначение платежа');
      return;
    }
    if (amount <= 0 || isNaN(amount)) {
      alert('Введите корректную сумму');
      return;
    }
    if (amount > users[currentUser].balance) {
      alert('Недостаточно средств');
      return;
    }
    
    users[currentUser].balance -= amount;
    
    if (!users[currentUser].transactions) users[currentUser].transactions = [];
    users[currentUser].transactions.push({
      type: 'payment',
      amount: amount,
      desc: desc,
      date: new Date().toISOString()
    });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('paymentSum').value = '';
    document.getElementById('paymentFor').value = '';
    showToast(`✅ Оплачено: ${desc}`);
  };

  // Табы
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      
      const t = tab.dataset.tab;
      document.getElementById('transferTab').classList.add('hidden');
      document.getElementById('depositTab').classList.add('hidden');
      document.getElementById('paymentTab').classList.add('hidden');
      
      if (t === 'transfer') document.getElementById('transferTab').classList.remove('hidden');
      if (t === 'deposit') document.getElementById('depositTab').classList.remove('hidden');
      if (t === 'payment') document.getElementById('paymentTab').classList.remove('hidden');
    };
  });

  document.getElementById('refreshUsers').onclick = async () => {
    await loadFromServer();
    updateUI();
    showToast('🔄 Список обновлён');
  };

  // Запуск
  loadFromServer();
  
  // Автообновление
  setInterval(() => {
    if (currentUser && Date.now() - lastUpdate > 3000) {
      loadFromServer();
    }
  }, 3000);
</script>
</body>
</html>
