<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Банк — Облачная версия</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f0f5fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 20px 16px 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #1e3b5c;
    }

    .sync-status {
      background: #2a9d8f;
      color: white;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .card {
      background: #f8fbfe;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 1.2rem;
      color: #1e3b5c;
      margin-bottom: 16px;
    }

    .balance {
      background: #1e3b5c;
      border-radius: 16px;
      padding: 16px;
      color: white;
      margin-bottom: 16px;
    }

    .balance-amount {
      font-size: 2rem;
      font-weight: 700;
    }

    .btn {
      border: none;
      border-radius: 50px;
      padding: 14px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: #1e3b5c;
      color: white;
      width: 100%;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-outline {
      background: white;
      color: #1e3b5c;
      border: 1px solid #d0dce8;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 1px solid #dde5ed;
      border-radius: 12px;
      margin-bottom: 12px;
      outline: none;
    }

    .users-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .user-tag {
      background: white;
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px solid #c8d8e8;
      cursor: pointer;
    }

    .user-tag:active {
      background: #1e3b5c;
      color: white;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: #eef3f9;
      border-radius: 30px;
      font-weight: 600;
      color: #5f7d99;
      cursor: pointer;
    }

    .tab.active {
      background: #1e3b5c;
      color: white;
    }

    .history-item {
      padding: 12px;
      border-bottom: 1px solid #e8eef4;
      display: flex;
      justify-content: space-between;
    }

    .amount-plus {
      color: #2a9d8f;
      font-weight: 700;
    }

    .amount-minus {
      color: #e76f51;
      font-weight: 700;
    }

    .error {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: -8px;
      margin-bottom: 8px;
    }

    .hidden {
      display: none !important;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3b5c;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      z-index: 2000;
      animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
      0%, 50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      margin-right: 4px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">Logo Банк</div>
    <div class="sync-status" id="syncStatus">
      <span>🟢</span> Онлайн
    </div>
  </div>

  <!-- Авторизация -->
  <div id="authScreen">
    <div class="card">
      <h2>Вход</h2>
      <input type="text" id="loginUser" placeholder="Логин">
      <input type="password" id="loginPass" placeholder="Пароль">
      <div class="error" id="loginError"></div>
      <button class="btn" id="loginBtn">Войти</button>
      <button class="btn btn-outline" id="showRegBtn" style="margin-top:8px;">Регистрация</button>
      <div style="margin-top:12px; font-size:0.9rem; color:#6f8aa3; text-align:center;">
        Демо: demo / demo
      </div>
    </div>
  </div>

  <!-- Регистрация -->
  <div id="regScreen" class="hidden">
    <div class="card">
      <h2>Регистрация</h2>
      <input type="text" id="regUser" placeholder="Логин (мин. 3 символа)">
      <input type="password" id="regPass" placeholder="Пароль (мин. 4 символа)">
      <input type="password" id="regPassConfirm" placeholder="Повторите пароль">
      <div class="error" id="regError"></div>
      <button class="btn" id="regBtn">Создать аккаунт</button>
      <button class="btn btn-outline" id="backToAuth" style="margin-top:8px;">← Назад</button>
    </div>
  </div>

  <!-- Основной экран -->
  <div id="mainScreen" class="hidden">
    <div class="flex-between" style="margin-bottom:16px;">
      <h2>👤 <span id="userName"></span></h2>
      <button class="btn-outline" id="logoutBtn" style="width:auto; padding:8px 16px;">Выйти</button>
    </div>

    <!-- Баланс -->
    <div class="balance">
      <div>Баланс</div>
      <div class="balance-amount"><span id="balance">0</span> ₽</div>
    </div>

    <!-- Табы -->
    <div class="tabs">
      <div class="tab active" data-tab="transfer">💸 Перевод</div>
      <div class="tab" data-tab="deposit">⬆️ Пополнить</div>
      <div class="tab" data-tab="payment">🛒 Оплата</div>
    </div>

    <!-- Перевод -->
    <div id="transferTab" class="card">
      <h2>Перевод денег</h2>
      <div class="flex-between" style="margin-bottom:8px;">
        <span>Кому:</span>
        <button class="btn-outline" id="refreshUsers" style="width:auto; padding:6px 12px;">🔄 Обновить</button>
      </div>
      <div class="users-list" id="usersContainer"></div>
      <input type="text" id="transferTo" placeholder="Логин получателя">
      <input type="number" id="transferSum" placeholder="Сумма" min="1" step="0.01">
      <div class="error" id="transferError"></div>
      <button class="btn" id="transferBtn">Отправить</button>
    </div>

    <!-- Пополнение -->
    <div id="depositTab" class="card hidden">
      <h2>Пополнение</h2>
      <input type="number" id="depositSum" placeholder="Сумма" min="1">
      <button class="btn" id="depositBtn">Пополнить</button>
    </div>

    <!-- Оплата -->
    <div id="paymentTab" class="card hidden">
      <h2>Оплата</h2>
      <input type="text" id="paymentFor" placeholder="За что платим?">
      <input type="number" id="paymentSum" placeholder="Сумма" min="1">
      <button class="btn" id="paymentBtn">Оплатить</button>
    </div>

    <!-- История -->
    <div class="card">
      <h2>📋 История</h2>
      <div id="historyContainer" style="max-height:200px; overflow-y:auto;"></div>
    </div>
  </div>
</div>

<script>
  // БЫСТРЫЙ ОБЛАЧНЫЙ СЕРВЕР (уже настроен)
  const SERVER_URL = 'https://jsonblob.com/api/jsonBlob/1331430566159187968';
  
  let users = {};
  let currentUser = null;

  function showToast(text) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = text;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  // Загрузка данных с сервера (очень быстро)
  async function loadFromServer() {
    try {
      document.getElementById('syncStatus').innerHTML = '<span><span class="loading"></span></span> Синхр...';
      
      const response = await fetch(SERVER_URL);
      if (response.ok) {
        users = await response.json();
        localStorage.setItem('bank_cache', JSON.stringify(users));
        document.getElementById('syncStatus').innerHTML = '<span>🟢</span> Онлайн';
      }
      
      // Восстанавливаем сессию
      const savedUser = localStorage.getItem('bank_current_user');
      if (savedUser && users[savedUser]) {
        currentUser = savedUser;
        showMainScreen();
      }
      
      updateUI();
    } catch (e) {
      console.log('Офлайн, использую кеш');
      document.getElementById('syncStatus').innerHTML = '<span>🟠</span> Офлайн';
      
      const cached = localStorage.getItem('bank_cache');
      if (cached) users = JSON.parse(cached);
      
      const savedUser = localStorage.getItem('bank_current_user');
      if (savedUser && users[savedUser]) {
        currentUser = savedUser;
        showMainScreen();
      }
      
      updateUI();
    }
  }

  // Сохранение на сервер
  async function saveToServer() {
    try {
      localStorage.setItem('bank_cache', JSON.stringify(users));
      
      await fetch(SERVER_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(users)
      });
      
      document.getElementById('syncStatus').innerHTML = '<span>🟢</span> Онлайн';
    } catch (e) {
      console.log('Сохранено локально');
      document.getElementById('syncStatus').innerHTML = '<span>🟠</span> Локально';
    }
  }

  function updateUI() {
    if (!currentUser) return;
    
    const user = users[currentUser];
    document.getElementById('userName').textContent = currentUser;
    document.getElementById('balance').textContent = user.balance.toFixed(2);
    
    // История
    const historyDiv = document.getElementById('historyContainer');
    const tx = user.transactions || [];
    
    if (tx.length === 0) {
      historyDiv.innerHTML = '<p style="color:#888; text-align:center;">Нет операций</p>';
    } else {
      historyDiv.innerHTML = tx.slice(-10).reverse().map(t => {
        const isPlus = t.type === 'deposit' || t.to === currentUser;
        return `
          <div class="history-item">
            <div>
              <div>${t.desc || t.type}</div>
              <small>${new Date(t.date).toLocaleString()}</small>
            </div>
            <div class="${isPlus ? 'amount-plus' : 'amount-minus'}">
              ${isPlus ? '+' : '-'}${t.amount.toFixed(2)} ₽
            </div>
          </div>
        `;
      }).join('');
    }
    
    // Список пользователей
    const usersDiv = document.getElementById('usersContainer');
    const otherUsers = Object.keys(users).filter(u => u !== currentUser);
    
    if (otherUsers.length === 0) {
      usersDiv.innerHTML = '<span style="color:#888;">Нет пользователей</span>';
    } else {
      usersDiv.innerHTML = otherUsers.map(u => 
        `<span class="user-tag" onclick="document.getElementById('transferTo').value='${u}'">${u}</span>`
      ).join('');
    }
  }

  function showMainScreen() {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('regScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    updateUI();
  }

  // Загрузка при старте
  loadFromServer();

  // Обработчики
  document.getElementById('loginBtn').onclick = async () => {
    const login = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    
    await loadFromServer();
    
    if (users[login] && users[login].password === pass) {
      currentUser = login;
      localStorage.setItem('bank_current_user', currentUser);
      showMainScreen();
      document.getElementById('loginUser').value = '';
      document.getElementById('loginPass').value = '';
    } else {
      document.getElementById('loginError').textContent = 'Неверный логин или пароль';
    }
  };

  document.getElementById('showRegBtn').onclick = () => {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('regScreen').classList.remove('hidden');
  };

  document.getElementById('backToAuth').onclick = () => {
    document.getElementById('regScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
  };

  document.getElementById('regBtn').onclick = async () => {
    const login = document.getElementById('regUser').value.trim();
    const pass = document.getElementById('regPass').value;
    const confirm = document.getElementById('regPassConfirm').value;
    
    if (login.length < 3) {
      document.getElementById('regError').textContent = 'Логин от 3 символов';
      return;
    }
    if (pass.length < 4) {
      document.getElementById('regError').textContent = 'Пароль от 4 символов';
      return;
    }
    if (pass !== confirm) {
      document.getElementById('regError').textContent = 'Пароли не совпадают';
      return;
    }
    
    await loadFromServer();
    
    if (users[login]) {
      document.getElementById('regError').textContent = 'Пользователь уже есть';
      return;
    }
    
    users[login] = {
      password: pass,
      balance: 0,
      transactions: []
    };
    
    await saveToServer();
    showToast('✅ Регистрация успешна!');
    
    document.getElementById('regScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('regUser').value = '';
    document.getElementById('regPass').value = '';
    document.getElementById('regPassConfirm').value = '';
  };

  document.getElementById('logoutBtn').onclick = () => {
    currentUser = null;
    localStorage.removeItem('bank_current_user');
    document.getElementById('mainScreen').classList.add('hidden');
    document.getElementById('authScreen').classList.remove('hidden');
  };

  // Перевод
  document.getElementById('transferBtn').onclick = async () => {
    const to = document.getElementById('transferTo').value.trim();
    const amount = parseFloat(document.getElementById('transferSum').value);
    
    await loadFromServer(); // Получаем свежие данные
    
    if (!to || !users[to]) {
      document.getElementById('transferError').textContent = 'Пользователь не найден';
      return;
    }
    if (to === currentUser) {
      document.getElementById('transferError').textContent = 'Нельзя перевести себе';
      return;
    }
    if (amount <= 0 || isNaN(amount)) {
      document.getElementById('transferError').textContent = 'Неверная сумма';
      return;
    }
    if (amount > users[currentUser].balance) {
      document.getElementById('transferError').textContent = 'Недостаточно средств';
      return;
    }
    
    users[currentUser].balance -= amount;
    users[to].balance += amount;
    
    const tx = {
      type: 'transfer',
      amount: amount,
      from: currentUser,
      to: to,
      desc: `Перевод для ${to}`,
      date: new Date().toISOString()
    };
    
    if (!users[currentUser].transactions) users[currentUser].transactions = [];
    if (!users[to].transactions) users[to].transactions = [];
    
    users[currentUser].transactions.push(tx);
    users[to].transactions.push({
      ...tx,
      desc: `От ${currentUser}`
    });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('transferSum').value = '';
    document.getElementById('transferTo').value = '';
    document.getElementById('transferError').textContent = '';
    showToast(`✅ Отправлено ${amount.toFixed(2)} ₽`);
  };

  // Пополнение
  document.getElementById('depositBtn').onclick = async () => {
    const amount = parseFloat(document.getElementById('depositSum').value);
    
    if (amount <= 0 || isNaN(amount)) {
      alert('Неверная сумма');
      return;
    }
    
    users[currentUser].balance += amount;
    
    if (!users[currentUser].transactions) users[currentUser].transactions = [];
    users[currentUser].transactions.push({
      type: 'deposit',
      amount: amount,
      desc: 'Пополнение',
      date: new Date().toISOString()
    });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('depositSum').value = '';
    showToast(`✅ Пополнено ${amount.toFixed(2)} ₽`);
  };

  // Оплата
  document.getElementById('paymentBtn').onclick = async () => {
    const desc = document.getElementById('paymentFor').value.trim();
    const amount = parseFloat(document.getElementById('paymentSum').value);
    
    if (!desc) {
      alert('Укажите назначение');
      return;
    }
    if (amount <= 0 || isNaN(amount)) {
      alert('Неверная сумма');
      return;
    }
    if (amount > users[currentUser].balance) {
      alert('Недостаточно средств');
      return;
    }
    
    users[currentUser].balance -= amount;
    
    if (!users[currentUser].transactions) users[currentUser].transactions = [];
    users[currentUser].transactions.push({
      type: 'payment',
      amount: amount,
      desc: desc,
      date: new Date().toISOString()
    });
    
    await saveToServer();
    updateUI();
    
    document.getElementById('paymentSum').value = '';
    document.getElementById('paymentFor').value = '';
    showToast(`✅ Оплачено: ${desc}`);
  };

  // Табы
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      
      const t = tab.dataset.tab;
      document.getElementById('transferTab').classList.add('hidden');
      document.getElementById('depositTab').classList.add('hidden');
      document.getElementById('paymentTab').classList.add('hidden');
      
      if (t === 'transfer') document.getElementById('transferTab').classList.remove('hidden');
      if (t === 'deposit') document.getElementById('depositTab').classList.remove('hidden');
      if (t === 'payment') document.getElementById('paymentTab').classList.remove('hidden');
    };
  });

  document.getElementById('refreshUsers').onclick = async () => {
    await loadFromServer();
    updateUI();
    showToast('🔄 Список обновлён');
  };

  // Автообновление каждые 5 секунд
  setInterval(async () => {
    if (currentUser) {
      await loadFromServer();
      updateUI();
    }
  }, 5000);
</script>
</body>
</html>
